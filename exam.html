if(questions.length < 100) {
    for(let i = questions.length + 1; i <= 100; i++) {
        questions.push({ q: i + ". নমুনা প্রশ্ন " + i, a: "ক", options: ["ক", "খ", "গ", "ঘ"] });
    }
}

let timer;
let timeLeft = 3600;

function startExam() {
    const name = document.getElementById('userName').value.trim();
    const roll = document.getElementById('userRoll').value.trim();
    if(!name || !roll) return alert("দয়া করে নাম এবং রোল নম্বর ইনপুট দিন!");

    document.getElementById('auth-box').classList.add('hidden');
    document.getElementById('exam-box').classList.remove('hidden');
    
    renderQuestions();
    startTimer();
}

function renderQuestions() {
    const container = document.getElementById('questions-container');
    container.innerHTML = questions.map((item, index) => `
        <div class="question">
            <p>${item.q}</p>
            <div class="options">
                ${item.options.map(opt => `
                    <label><input type="radio" name="q${index}" value="${opt}"> ${opt}</label>
                `).join('')}
            </div>
        </div>
    `).join('');
}

function startTimer() {
    timer = setInterval(() => {
        timeLeft--;
        let mins = Math.floor(timeLeft / 60);
        let secs = timeLeft % 60;
        document.getElementById('timer').innerText = `সময় বাকি: ${mins}:${secs < 10 ? '0'+secs : secs}`;
        if(timeLeft <= 0) submitExam();
    }, 1000);
}

async function submitExam() {
    clearInterval(timer); // টাইমার বন্ধ করা
    let correct = 0;
    let wrong = 0;

    // ১. সঠিক ও ভুল উত্তর গণনা করা
    questions.forEach((item, index) => {
        const selected = document.querySelector(`input[name="q${index}"]:checked`);
        if(selected) {
            if(selected.value === item.a) correct++;
            else wrong++;
        }
    });

    // ২. নেগেটিভ মার্কিং হিসাব করা
    const finalScore = (correct - (wrong * 0.25)).toFixed(2);
    
    // ৩. ইনপুট থেকে ডাটা নেওয়া
    const uName = document.getElementById('userName').value.trim();
    const uRoll = document.getElementById('userRoll').value.trim();

    try {
        // ৪. Firebase Realtime Database-এ রোল নম্বর অনুযায়ী ডাটা সেভ করা
        // এখানে .child(uRoll).set() ব্যবহারের ফলে আইডি'র বদলে রোল দেখাবে
        await db.ref("exam_results").child(uRoll).set({
            name: uName,
            roll: uRoll,
            score: parseFloat(finalScore),
            timestamp: Date.now()
        });

        // ৫. স্ক্রিনে রেজাল্ট দেখানো
        document.getElementById('exam-box').classList.add('hidden');
        document.getElementById('result-box').classList.remove('hidden');
        document.getElementById('score-display').innerText = finalScore;
        document.getElementById('detail-display').innerText = `সঠিক: ${correct} | ভুল: ${wrong} | মোট প্রশ্ন: ১০০`;

    } catch (e) {
        console.error("Error saving data:", e);
        alert("ইন্টারনেট সংযোগ চেক করুন! ডাটা সেভ করা যায়নি।");
    }
}

function showLeaderboard() {
    document.getElementById('result-box').classList.add('hidden');
    document.getElementById('admin-box').classList.remove('hidden');
    
    db.ref("exam_results").orderByChild("score").limitToLast(20).on("value", (snapshot) => {
        const tbody = document.getElementById('leaderboardBody');
        tbody.innerHTML = "";
        let results = [];
        
        snapshot.forEach((childSnapshot) => {
            results.push(childSnapshot.val());
        });

        results.reverse(); // স্কোর অনুযায়ী বড় থেকে ছোট সাজানো

        results.forEach((data, index) => {
            let rank = index + 1;
            let crown = "";

            // ১লা, ২য় এবং ৩য় স্থানের জন্য মুকুট বা মেডেল লজিক
            if (rank === 1) {
                crown = "👑 "; // গোল্ডেন ক্রাউন
            } else if (rank === 2) {
                crown = "🥈 "; // সিলভার মেডেল
            } else if (rank === 3) {
                crown = "🥉 "; // ব্রোঞ্জ মেডেল
            }

            tbody.innerHTML += `
                <tr>
                    <td style="font-weight:bold">${crown}${rank}</td>
                    <td>${data.roll}</td>
                    <td>${data.name}</td>
                    <td style="font-weight:bold; color:var(--primary)">${data.score}</td>
                </tr>`;
        });
    });
}
</script>
